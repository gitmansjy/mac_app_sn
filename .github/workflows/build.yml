name: Build macOS App

on:
  push:
    branches: [ "main" ]   # 当推送到 main 分支时触发
  workflow_dispatch:       # 允许在网页上手动触发

jobs:
  build:
    runs-on: macos-latest   # 使用 GitHub 提供的 macOS 云服务器
    steps:
      # 1. 拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'    # 使用相对稳定的 Python 3.11 版本

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller   # 确保安装 PyInstaller

      # 4. 关键编译步骤：使用 PyInstaller 打包成 .app
      - name: Build with PyInstaller
        run: |
          # '--windowed' 参数会确保生成 .app 包而不是命令行工具
          pyinstaller --windowed --onefile --name "SN图片处理工具" sn_processor.py

      # 5. 打包 .app 文件为 .zip 文件，便于下载
      - name: Compress .app to .zip
        run: |
          cd dist
          zip -r "SN图片处理工具_macOS.zip" "SN图片处理工具.app"

      # 6. 上传编译结果作为“Artifact”
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SN图片处理工具_macOS   # 压缩包的名称
          path: dist/SN图片处理工具_macOS.zip   # 需要上传的文件路径